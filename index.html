<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PixelCraft Studio | Affordable Graphic Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Sora:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:#0d0d16;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111122;
position:sticky;
top:0;
}

.logo{
font-size:32px;
font-weight:700;
color:#a855f7;
}

.logo span{
color:white;
font-style:italic;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:#a855f7;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#cccccc;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#a855f7;
color:white;
border-radius:50px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#7e22ce;
transform:scale(1.05);
}

.services{
padding:80px 8%;
}

.services h2{
text-align:center;
font-size:40px;
margin-bottom:50px;
}

.cards
